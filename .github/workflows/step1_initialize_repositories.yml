name: 'Step 1: Initialize Repositories'

on:
  workflow_dispatch:
    inputs:
      generate_evidence_keys:
        description: 'Force generation of new Evidence Signing Keys.'
        required: false
        type: boolean
        default: false
      evidence_key_alias:
        description: 'Evidence key alias (default: bookverse-signing-key)'
        required: false
        type: string
        default: 'bookverse-signing-key'
      update_k8s:
        description: 'Update Kubernetes cluster registry (requires kubectl access)'
        required: false
        type: boolean
        default: false

env:
  JF_URL: ${{ vars.JFROG_URL }}
  JF_ACCESS_TOKEN: ${{ secrets.JFROG_ADMIN_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  COMPONENTS: "checkout demo-assets demo-init helm infra inventory platform recommendations web"
  JFROG_CLI_AVOID_NEW_VERSION_WARNING: "TRUE"

concurrency:
  group: switch-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  initialize-repositories:
    runs-on: ubuntu-latest
    name: Switch Platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.91.0

      - name: Validate Confirmation
        env:
          JFROG_URL: ${{ vars.JFROG_URL }}
          JFROG_ADMIN_TOKEN: ${{ secrets.JFROG_ADMIN_TOKEN }}
          PROJECT_KEY: ${{ vars.PROJECT_KEY }}
        run: |
          # Validate the JFrog URL
          if [[ -z "${JFROG_URL}" ]]; then
            echo "ERROR: JFROG_URL variable not set."
            exit 1
          fi
          
          # Validate the JFrog Admin Token
          if [[ -z "${JFROG_ADMIN_TOKEN}" ]]; then
            echo "ERROR: JFROG_ADMIN_TOKEN secret not set."
            exit 1
          fi
          
          # Validate the JFrog Project Key
          if [[ -z "${PROJECT_KEY}" ]]; then
            echo "ERROR: PROJECT_KEY variable not set."
            exit 1
          fi
          
          # Validate the GitHub Token
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "ERROR: GH_TOKEN secret not set."
            exit 1
          fi

      - name: Verify Git Repository Forks
        run: |
          echo "Forking the needed repositories"
          # skipping bookverse-demo-init as this should already be forked to run this action
          for item in ${COMPONENTS}; do
            if gh repo view "${{ github.repository_owner }}/bookverse-${item}" >/dev/null 2>&1; then
              echo "${{ github.repository_owner }}/bookverse-${item} already exists"
            else
              gh repo fork bookverse-example/bookverse-${item} --fork-name bookverse-${item}
            fi
          done
          # FIXME: SET JF_URL and JF_ADMIN_TOKEN on forks

      - name: Verify JFrog Platform Connectivity
        run: |
          echo "Checking JFrog Platform access from the JF CLI."
          jf rt ping

      - name: Generate Evidence Signing Keys
        env:
          EVIDENCE_KEY_ALIAS: ${{ github.event.inputs.evidence_key_alias }}
          EVIDENCE_PRIVATE_SECRET: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_PUBLIC_VARIABLE: ${{ vars.EVIDENCE_PUBLIC_KEY }}
          EVIDENCE_ALIAS_VARIABLE: ${{ vars.EVIDENCE_KEY_ALIAS }}
        if: ${{ env.EVIDENCE_PRIVATE_SECRET == '' || env.EVIDENCE_PUBLIC_VARIABLE == '' || env.EVIDENCE_ALIAS_VARIABLE == '' || github.event.inputs.generate_evidence_keys == 'true' }}
        run: |
          echo "Generating Evidence Signing Keys.  Either the keys are unset or the force regenerate option has been set."
          source .github/scripts/setup/upload_evidence_public_key.sh
          jf evd generate-key-pair --key-alias "${EVIDENCE_KEY_ALIAS}" --key-file-name "${EVIDENCE_KEY_ALIAS}" --key-file-path "./keys" --upload-public-key="false"
          # FIXME: This should probably be moved to the "Step 2: Setup Platform" workflow.
          upload_evidence_key_to_jfrog "./keys/${EVIDENCE_KEY_ALIAS}.pub" "${EVIDENCE_KEY_ALIAS}"
          gh secret set "EVIDENCE_PRIVATE_KEY" --body "$(cat ./keys/${EVIDENCE_KEY_ALIAS}.key)" --repo "${{ github.repository_owner }}/bookverse-demo-init"
          # FIXME: Should the following be secrets or variables?
          gh variable set "EVIDENCE_PUBLIC_KEY" --body "$(cat ./keys/${EVIDENCE_KEY_ALIAS}.pub)" --repo "${{ github.repository_owner }}/bookverse-demo-init"
          gh variable set "EVIDENCE_KEY_ALIAS" --body "${EVIDENCE_KEY_ALIAS}" --repo "${{ github.repository_owner }}/bookverse-demo-init"

      - name: Update GitHub Repository Secrets and Variables
        # NOTE: These secrets and variables are pulled again in case they've been updated.
        env:
          JFROG_URL: ${{ vars.JFROG_URL }}
          JFROG_ADMIN_TOKEN: ${{ secrets.JFROG_ADMIN_TOKEN }}
          PROJECT_KEY: ${{ vars.PROJECT_KEY }}
          EVIDENCE_PRIVATE_SECRET: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_PUBLIC_VARIABLE: ${{ vars.EVIDENCE_PUBLIC_KEY }}
          EVIDENCE_ALIAS_VARIABLE: ${{ vars.EVIDENCE_KEY_ALIAS }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "Updating GitHub Repository Secrets and Variables"
          for item in ${COMPONENTS}; do
            echo "Storing secrets and variables for repo ${{ github.repository_owner }}/bookverse-${item}"
            # NOTE: Skip some values that we don't want to overwrite if the demo-init repo
            if [[ ${item} != "demo-init" ]]; then
              gh secret set "JFROG_ADMIN_TOKEN" --body "${JFROG_ADMIN_TOKEN}" --repo "${REPO_OWNER}/bookverse-${item}"
              gh variable set "JFROG_URL" --body "${JFROG_URL}" --repo "${REPO_OWNER}/bookverse-${item}"
              gh variable set "PROJECT_KEY" --body "${PROJECT_KEY}" --repo "${REPO_OWNER}/bookverse-${item}"
              gh secret set "EVIDENCE_PRIVATE_KEY" --body "${EVIDENCE_PRIVATE_SECRET}" --repo "${REPO_OWNER}/bookverse-${item}"
              gh variable set "EVIDENCE_PUBLIC_KEY" --body "${EVIDENCE_PUBLIC_VARIABLE}" --repo "${REPO_OWNER}/bookverse-${item}"
              gh variable set "EVIDENCE_KEY_ALIAS" --body "${EVIDENCE_ALIAS_VARIABLE}" --repo "${REPO_OWNER}/bookverse-${item}"
            fi
            gh variable set "DOCKER_REGISTRY" --body "$(echo ${JFROG_URL} | sed 's|https://||')" --repo "${REPO_OWNER}/bookverse-${item}"
          done

      - name: Update Kubernetes Cluster Registry
        # FIXME: Need to figure this part out, but that can come later.
        if: github.event.inputs.update_k8s == 'true'
        run: |
          echo "🔧 Updating Kubernetes cluster registry configuration..."
          echo ""
          
          if ! command -v kubectl >/dev/null 2>&1; then
            echo "❌ kubectl not found. Installing kubectl..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "❌ Cannot connect to Kubernetes cluster"
            echo "   Make sure your cluster is accessible and kubeconfig is configured"
            echo "   Skipping K8s update - you'll need to update manually"
            exit 0
          fi
          
          if ./scripts/k8s/update-registry.sh --restart-deployments; then
            echo ""
            echo "✅ Kubernetes cluster updated successfully!"
            echo "   - Registry secret updated with new platform credentials"
            echo "   - Deployments restarted to pull from new registry"
          else
            echo ""
            echo "⚠️  Kubernetes update failed - you'll need to update manually"
            echo "   See the manual update instructions in the documentation"
          fi

      - name: Output Summary
        if: always()
        run: |
          echo "## Results - Initialize Repositories" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "**BookVerse is now configured for the new platform**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Platform: \`${{ vars.JFROG_URL }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Forked (if not already) the following repos:" >> $GITHUB_STEP_SUMMARY
            for item in ${COMPONENTS}; do
              echo "  - ${{ github.repository_owner }}/bookverse-${item}" >> $GITHUB_STEP_SUMMARY
            done
            echo "- Updated the following secrets and variables in the forked repos:" >> $GITHUB_STEP_SUMMARY
            echo "  - Secret JFROG_ADMIN_TOKEN: ***" >> $GITHUB_STEP_SUMMARY
            echo "  - Variable JFROG_URL: ${{ vars.JFROG_URL }}" >> $GITHUB_STEP_SUMMARY
            echo "  - Variable PROJECT_KEY: ${{ vars.PROJECT_KEY }}" >> $GITHUB_STEP_SUMMARY
            echo "  - Variable DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
            echo "  - Secret EVIDENCE_PRIVATE_KEY: ***" >> $GITHUB_STEP_SUMMARY
            echo "  - Variable EVIDENCE_PUBLIC_KEY: ${{ vars.EVIDENCE_PUBLIC_KEY }}" >> $GITHUB_STEP_SUMMARY
            echo "  - Variable EVIDENCE_KEY_ALIAS: ${{ vars.EVIDENCE_KEY_ALIAS }}" >> $GITHUB_STEP_SUMMARY
          fi
