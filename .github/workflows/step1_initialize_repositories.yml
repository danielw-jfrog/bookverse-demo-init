name: 'Step 1: Initialize Repositories'

on:
  workflow_dispatch:
    inputs:
      setup_mode:
        description: 'Operation mode: initial_setup (first-time setup) or platform_switch (migrate/refresh)'
        required: true
        type: choice
        options:
          - initial_setup
          - platform_switch
        default: 'initial_setup'
      confirm_switch:
        description: 'Type "SWITCH" to confirm (required for platform_switch mode)'
        required: false
        type: string
      generate_evidence_keys:
        description: 'Generate new evidence keys if not present (recommended for initial_setup)'
        required: false
        type: boolean
        default: true
      evidence_key_type:
        description: 'Evidence key algorithm (rsa, ec, ed25519)'
        required: false
        type: choice
        options:
          - rsa
          - ec
          - ed25519
        default: 'rsa'
      evidence_key_alias:
        description: 'Evidence key alias (default: bookverse-signing-key)'
        required: false
        type: string
        default: 'bookverse-signing-key'
      update_code_urls:
        description: 'Update hardcoded URLs in source code (skip for initial_setup)'
        required: false
        type: boolean
        default: false
      update_k8s:
        description: 'Update Kubernetes cluster registry (requires kubectl access)'
        required: false
        type: boolean
        default: false

env:
  NEW_JFROG_URL: ${{ secrets.JFROG_URL }}
  JF_URL: ${{ secrets.JFROG_URL }}
  JFROG_ADMIN_TOKEN: ${{ secrets.JFROG_ADMIN_TOKEN }}
  JF_ACCESS_TOKEN: ${{ secrets.JFROG_ADMIN_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  COMPONENTS: "checkout demo-assets helm infra inventory platform recommendations web"
  JFROG_CLI_AVOID_NEW_VERSION_WARNING: "TRUE"
  EVIDENCE_KEY_ALIAS: ${{ github.event.inputs.evidence_key_alias }}
  PROJECT_KEY: bookverse

concurrency:
  group: switch-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  switch-platform:
    runs-on: ubuntu-latest
    name: Switch Platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.88.0

      - name: Validate Confirmation
        run: |
          SETUP_MODE="${{ github.event.inputs.setup_mode }}"
          if [[ "$SETUP_MODE" == "platform_switch" ]]; then
            if [[ "${{ github.event.inputs.confirm_switch }}" != "SWITCH" ]]; then
              echo "❌ Platform switch cancelled: Invalid confirmation input"
              echo "   You must type 'SWITCH' to confirm platform migration"
              exit 1
            fi
            echo "✅ Platform switch confirmed. Proceeding with platform migration..."
          else
            echo "? initial_setup ?"
          fi
          
          # Validate the JFrog URL
          if [[ -z "${NEW_JFROG_URL}" ]]; then
            echo "ERROR: JFROG_URL secret not set."
            exit 1
          fi
          
          # Validate the JFrog Admin Token
          if [[ -z "${JFROG_ADMIN_TOKEN}" ]]; then
            echo "ERROR: JFROG_ADMIN_TOKEN secret not set."
            exit 1
          fi
          
          # Validate the GitHub Token
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "ERROR: GH_TOKEN secret not set."
            exit 1
          fi

      - name: Verify Git Repository Forks
        run: |
          echo "Forking the needed repositories"
          # skipping bookverse-demo-init as this should already be forked to run this action
          for item in ${COMPONENTS}; do
            if gh repo view "${{ github.repository_owner }}/bookverse-${item}" >/dev/null 2>&1; then
              echo "${{ github.repository_owner }}/bookverse-${item} already exists"
            else
              gh repo fork bookverse-example/bookverse-${item} --fork-name bookverse-${item}
            fi
          done
          # FIXME: SET JF_URL and JF_ADMIN_TOKEN on forks

      - name: Verify JFrog Platform Connectivity
        run: |
          echo "Checking JFrog Platform access from the JF CLI."
          jf rt ping

      - name: Generate Evidence Keys
        if: ${{ github.event.inputs.generate_evidence_keys }}
        run: |
          echo "Generating evidence keys"
          pwd
          # FIXME: Should these be recreated if they already exist?  Or pull pre-existing ones?
          # FIXME: The following shoudl error out if the key fails to upload.
          jf evd generate-key-pair --key-alias "${EVIDENCE_KEY_ALIAS}" --key-file-name "${EVIDENCE_KEY_ALIAS}" --key-file-path "./keys"
          echo "Storing evidence keys into component github repository secrets"
          for item in ${COMPONENTS}; do
            echo "  Setting evidence key secrets for repo ${{ github.repository_owner }}/bookverse-${item}"
            gh secret set "EVIDENCE_PRIVATE_KEY" --body "$(cat ./keys/${EVIDENCE_KEY_ALIAS}.key)" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
            # FIXME: Should the following be secrets or variables?
            gh variable set "EVIDENCE_PUBLIC_KEY" --body "$(cat ./keys/${EVIDENCE_KEY_ALIAS}.pub)" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
            gh variable set "EVIDENCE_KEY_ALIAS" --body "${EVIDENCE_KEY_ALIAS}" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
          done

      - name: Update GitHub Repository Secrets and Variables
        run: |
          echo "Updating GitHub Repository Secrets and Variables"
          # FIXME: There was some retry logic around this.  Should it be retried?  Seems like bigger scope problems if this needs to be retried.
          for item in ${COMPONENTS}; do
            echo "Storing secrets and variables for repo ${{ github.repository_owner }}/bookverse-${item}"
            # Skip a couple of values if the demo-init repo
            if [[ ${item} != "demo-init" ]]; then
              gh secret set "JFROG_ADMIN_TOKEN" --body "${JFROG_ADMIN_TOKEN}" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
            fi
            # FIXME: Should this be made a secret and move into the skip section above?
            gh variable set "JFROG_URL" --body "${NEW_JFROG_URL}" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
            # FIXME: Should these be secrets or variables?  I'm leaning toward secrets, though it makes it hard to view the values as a user later.
            gh variable set "DOCKER_REGISTRY" --body "$(echo $NEW_JFROG_URL | sed 's|https://||')" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
            gh variable set "PROJECT_KEY" --body "${PROJECT_KEY}" --app "actions" --repo "${{ github.repository_owner }}/bookverse-${item}"
          done

      - name: Switch/Setup JFrog Platform
        run: |
          export SETUP_MODE='${{ github.event.inputs.setup_mode }}'
          export GENERATE_EVIDENCE_KEYS='${{ github.event.inputs.generate_evidence_keys }}'
          export EVIDENCE_KEY_TYPE='${{ github.event.inputs.evidence_key_type }}'
          export UPDATE_CODE_URLS='${{ github.event.inputs.update_code_urls }}'
          export JFROG_CLI_AVOID_NEW_VERSION_WARNING=true
          
          export NO_COLOR=1
          LOG_FILE="switch-platform.log"
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"
          
          if [[ "$SETUP_MODE" == "initial_setup" ]]; then
            echo "🚀 Starting Initial Platform Setup"
            echo "=================================================="
            echo "Mode: Initial Setup (first-time configuration)"
            echo "Target Platform: ${{ github.event.inputs.jpd_host }}"
            echo "Generate Evidence Keys: $GENERATE_EVIDENCE_KEYS"
            echo ""
          else
            echo "🔄 Starting JFrog Platform Switch"
            echo "=================================================="
            if [[ -z "${{ vars.JFROG_URL }}" ]]; then
              echo "⚠️  Missing vars.JFROG_URL. Treating as initial setup."
              export SETUP_MODE="initial_setup"
            else
              echo "From: ${{ vars.JFROG_URL }}"
              echo "To: ${{ github.event.inputs.jpd_host }}"
            fi
            echo ""
          fi

          set -o pipefail
          CONTINUE_ON_AUTH_FAILURE=1 ./.github/scripts/setup/switch_jfrog_platform.sh 2>&1 | tee "$LOG_FILE"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Uploading full log as artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload switch log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: switch-platform.log
          path: switch-platform.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Append log tail to summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📋 Switch Platform Log Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "switch-platform.log" ]]; then
            tail -n 200 "switch-platform.log" >> "$GITHUB_STEP_SUMMARY" || true
          fi
          
      - name: Validate New Platform
        run: |
          echo "🔍 Validating new platform connectivity..."
          # FIXME: Shouldn't this use the JF CLI?
          if curl -s --fail --header "Authorization: Bearer ${JFROG_ADMIN_TOKEN}" \
              "${NEW_JFROG_URL}/artifactory/api/system/ping" > /dev/null; then
            echo "✅ New platform validation successful"
          else
            echo "❌ New platform validation failed"
            exit 1
          fi
          
          echo ""
          echo "🎯 Platform Switch Summary:"
          echo "================================"
          echo "✅ Host validation: Passed"
          echo "✅ Connectivity test: Passed" 
          echo "✅ Service availability: Verified"
          echo "✅ All repositories updated: Confirmed"
          echo ""
          echo "🚀 BookVerse is now configured for the new platform!"

      - name: Update Kubernetes Cluster Registry
        if: github.event.inputs.update_k8s == 'true'
        run: |
          echo "🔧 Updating Kubernetes cluster registry configuration..."
          echo ""
          
          if ! command -v kubectl >/dev/null 2>&1; then
            echo "❌ kubectl not found. Installing kubectl..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "❌ Cannot connect to Kubernetes cluster"
            echo "   Make sure your cluster is accessible and kubeconfig is configured"
            echo "   Skipping K8s update - you'll need to update manually"
            exit 0
          fi
          
          if ./scripts/k8s/update-registry.sh --restart-deployments; then
            echo ""
            echo "✅ Kubernetes cluster updated successfully!"
            echo "   - Registry secret updated with new platform credentials"
            echo "   - Deployments restarted to pull from new registry"
          else
            echo ""
            echo "⚠️  Kubernetes update failed - you'll need to update manually"
            echo "   See the manual update instructions in the documentation"
          fi

      - name: 📋 Switch Platform Summary
        if: always()
        run: |
          echo "## 🔄 Platform Switch Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Logs: see artifact 'switch-platform.log' (if uploaded)" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ **Platform switch completed successfully**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎯 **BookVerse is now configured for the new platform**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            SETUP_MODE="${{ github.event.inputs.setup_mode }}"
            if [[ "$SETUP_MODE" == "initial_setup" ]]; then
              echo "### ✅ Initial Setup Details:" >> $GITHUB_STEP_SUMMARY
              echo "- 🎯 **Platform**: \`${{ github.event.inputs.jpd_host }}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ Migration Details:" >> $GITHUB_STEP_SUMMARY
              echo "- 🔗 **From**: \`${{ vars.JFROG_URL }}\`" >> $GITHUB_STEP_SUMMARY
              echo "- 🎯 **To**: \`${{ github.event.inputs.jpd_host }}\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- 📦 **Updated repositories**: All BookVerse service repositories" >> $GITHUB_STEP_SUMMARY
            echo "- 🔐 **Environment variables**: JFROG_URL, DOCKER_REGISTRY updated" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Validation**: New platform connectivity confirmed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            SETUP_MODE="${{ github.event.inputs.setup_mode }}"
            if [[ "$SETUP_MODE" == "initial_setup" ]]; then
              echo "### 📋 Next Steps:" >> $GITHUB_STEP_SUMMARY
              echo "1. 🏗️ **Run Setup Platform workflow** to create JFrog infrastructure (projects, repos, OIDC)" >> $GITHUB_STEP_SUMMARY
              echo "2. 🧪 **Test CI/CD workflows** to verify integration" >> $GITHUB_STEP_SUMMARY
              echo "3. 🔍 **Verify repository configurations** are correct" >> $GITHUB_STEP_SUMMARY
              echo "4. ⚙️ **Check evidence keys** were generated and distributed" >> $GITHUB_STEP_SUMMARY
            else
              echo "### 📋 Next Steps:" >> $GITHUB_STEP_SUMMARY
              echo "1. 🏗️ **Run Setup Platform workflow** to initialize the new environment" >> $GITHUB_STEP_SUMMARY
              echo "2. 🧪 **Test CI/CD workflows** to verify integration" >> $GITHUB_STEP_SUMMARY
              echo "3. 🔍 **Check service repositories** for updated configurations" >> $GITHUB_STEP_SUMMARY
              echo "4. ⚙️ **Verify platform-specific settings** (OIDC, webhooks, etc.)" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ github.event.inputs.update_k8s }}" != "true" ]]; then
              echo "5. 🔧 **Update Kubernetes cluster** manually (see documentation)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Platform switch failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔍 **Check the logs above for error details**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Common Issues:" >> $GITHUB_STEP_SUMMARY
            echo "- 🔐 **Authentication failed** with new platform" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 **Network connectivity** to new platform" >> $GITHUB_STEP_SUMMARY
            echo "- 🔒 **Invalid admin token** or insufficient permissions" >> $GITHUB_STEP_SUMMARY
            echo "- 📝 **Incorrect platform URL** format" >> $GITHUB_STEP_SUMMARY
            echo "- 🚫 **GitHub API rate limits** or token issues" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔧 Troubleshooting Steps:" >> $GITHUB_STEP_SUMMARY
            echo "1. ✅ **Verify platform URL** (format: https://hostname.jfrog.io)" >> $GITHUB_STEP_SUMMARY
            echo "2. 🔐 **Check admin token** has proper permissions" >> $GITHUB_STEP_SUMMARY
            echo "3. 🌐 **Test platform connectivity** manually" >> $GITHUB_STEP_SUMMARY
            echo "4. 📋 **Review GitHub token** scopes and permissions" >> $GITHUB_STEP_SUMMARY
            echo "5. 🔄 **Retry with corrected inputs** if needed" >> $GITHUB_STEP_SUMMARY
          fi
